<!DOCTYPE html>
<html lang="de-CH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="author" content="{{ site.author.name }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <link rel="icon" href="{{ '/assets/images/logo.svg' | relative_url }}" type="image/svg+xml">
</head>
<body>
  <header>
    <nav class="main-nav">
      <a href="{{ site.baseurl }}/" class="logo">The Power Addicts</a>
      <ul class="nav-list">
        <li><a href="{{ site.baseurl }}/">Home</a></li>
        <li><a href="{{ site.baseurl }}/about/">Über uns</a></li>
        <li><a href="{{ site.baseurl }}/services/">Services</a></li>
        <li><a href="{{ site.baseurl }}/workshops/">Workshops</a></li>
        <li><a href="{{ site.baseurl }}/newsletter/">Newsletter</a></li>
        <li><a href="{{ site.baseurl }}/affiliate/">Partner</a></li>
      </ul>
    </nav>
  </header>
  <main id="main-content">
    {{ content }}
  </main>
  <footer>
    <div class="footer-content">
      <div>
        <strong>The Power Addicts</strong> &copy; {{ site.time | date: '%Y' }}<br>
        <a href="mailto:info@thepoweraddicts.com">info@thepoweraddicts.com</a>
      </div>
      <div class="footer-links">
        <a href="https://www.linkedin.com/company/thepoweraddicts" target="_blank" rel="noopener">LinkedIn</a> |
        <a href="https://github.com/marcelehmann" target="_blank" rel="noopener">GitHub</a> |
        <a href="https://twitter.com/thepoweraddicts" target="_blank" rel="noopener">Twitter</a>
      </div>
    </div>
  </footer>
</body>
</html>
