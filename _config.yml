title: The Power Addicts
email: info@thepoweraddicts.com
description: >- # this means to ignore newlines until "baseurl:"
  Die Power Plattform Community für Workshops, Services und mehr.
baseurl: "/ThePowerAddicts.com" # the subpath of your site, e.g. /blog
url: "https://marcelehmann.github.io" # GitHub Pages URL anpassen
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Include pages from _pages directory
include:
  - _pages

# Collections
collections:
  pages:
    output: true
    permalink: /:name/

# Defaults for pages
defaults:
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: "default"

# Navigation
nav:
  - title: Home
    url: /
  - title: About
    url: /about/
  - title: Services
    url: /services/
  - title: Workshops
    url: /workshops/
  - title: Newsletter
    url: /newsletter/
  - title: Affiliate/Partner
    url: /affiliate/
